name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all

  build-linux:
    name: Build Linux (.deb + binary)
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Package tarball
        run: |
          cd target/release
          tar czf ../../y-linux-x86_64.tar.gz y

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: y-linux-deb
          path: target/debian/*.deb

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: y-linux-x86_64.tar.gz
          path: y-linux-x86_64.tar.gz

  build-macos:
    name: Build macOS (.dmg)
    needs: quality-gate
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create .app bundle
        run: |
          mkdir -p Y.app/Contents/MacOS
          cp target/${{ matrix.target }}/release/y Y.app/Contents/MacOS/y
          chmod +x Y.app/Contents/MacOS/y
          cat > Y.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>y</string>
              <key>CFBundleIdentifier</key>
              <string>com.elvisthebuilder.y</string>
              <key>CFBundleName</key>
              <string>Y</string>
              <key>CFBundleVersion</key>
              <string>0.1.0</string>
              <key>CFBundleShortVersionString</key>
              <string>0.1.0</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
          </dict>
          </plist>
          PLIST

      - name: Create .dmg
        run: |
          create-dmg \
            --volname "Y" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --hide-extension "Y.app" \
            --no-internet-enable \
            "y-macos-${{ matrix.arch }}.dmg" \
            "Y.app" || true

      - name: Package tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../y-macos-${{ matrix.arch }}.tar.gz y

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: y-macos-${{ matrix.arch }}.dmg
          path: y-macos-${{ matrix.arch }}.dmg

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: y-macos-${{ matrix.arch }}.tar.gz
          path: y-macos-${{ matrix.arch }}.tar.gz

  build-windows:
    name: Build Windows (.msi + .exe)
    needs: quality-gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Init WiX
        run: cargo wix init --force

      - name: Build .msi installer
        run: cargo wix --no-build --nocapture

      - name: Upload .msi
        uses: actions/upload-artifact@v4
        with:
          name: y-windows-msi
          path: target/wix/*.msi

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: y-windows-exe
          path: target/release/y.exe

  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/y-linux-deb/*.deb
            artifacts/y-linux-x86_64.tar.gz/*
            artifacts/y-macos-x86_64.tar.gz/*
            artifacts/y-macos-aarch64.tar.gz/*
            artifacts/y-macos-x86_64.dmg/*
            artifacts/y-macos-aarch64.dmg/*
            artifacts/y-windows-msi/*.msi
            artifacts/y-windows-exe/y.exe
